task:
  title: "Add shared local-skill runtime bootstrap"
  summary: >
    Dogfood uncovered that raw runLocalSkill call sites are now easy to get
    wrong after the core/adapters split. Introduce one shared helper for tests
    and scripts so local execution consistently carries default adapters,
    runtime directories, and env defaults.
  size: "small"
  risk_level: "low"
  context:
    packages:
      - "tests"
      - "scripts"
      - "packages/adapters"
      - "packages/core"
    files_impacted:
      - path: "tests/helpers"
        lines: "all"
        reason: "New shared runtime bootstrap helper"
      - path: "scripts/dogfood-github-issue-to-pr.mjs"
        lines: "all"
        reason: "Use the shared runtime helper instead of open-coded adapter wiring"
      - path: "tests/external-skill-proving-ground.test.ts"
        lines: "all"
        reason: "Use shared bootstrap for fresh-caller proving ground"
      - path: "tests/reflect-digest-skill.test.ts"
        lines: "all"
        reason: "Use shared bootstrap for direct skill execution"
      - path: "tests/issue-to-pr-chain.test.ts"
        lines: "direct runLocalSkill call sites"
        reason: "Use shared bootstrap for composite-skill execution"
    invariants:
      - "Default adapter assembly stays outside @runxhq/core"
      - "Scripts and tests use the same bootstrap semantics"
      - "Callers can still override env, receipt dirs, and adapters when needed"
  objectives:
    - "Create one helper that injects default adapters and sane local-runtime defaults"
    - "Use that helper in dogfood and proving-ground paths"
    - "Reduce repeated raw runLocalSkill setup in direct tests"
  touchpoints:
    - area: "tests/helpers"
      description: "Shared local execution helper"
    - area: "scripts/dogfood-github-issue-to-pr.mjs"
      description: "Dogfood script that previously hand-wired adapters"
    - area: "tests/*"
      description: "Direct runLocalSkill tests that should use one runtime path"
  acceptance:
    definition_of_done:
      - id: "dod1"
        description: "Dogfood and proving-ground paths use one shared bootstrap"
        status: "done"
        checked_at: "2026-04-23T12:18:34Z"
      - id: "dod2"
        description: "At least the direct skill tests that previously failed use the shared helper"
        status: "done"
        checked_at: "2026-04-23T12:18:34Z"
    validation:
      - id: "v1"
        type: "compile"
        description: "OSS workspace typechecks after bootstrap extraction"
        command: "pnpm typecheck"
        expected: "exit code 0"
      - id: "v2"
        type: "test"
        description: "Direct skill regression tests stay green with the helper"
        command: "pnpm exec vitest run tests/external-skill-proving-ground.test.ts tests/reflect-digest-skill.test.ts tests/issue-to-pr-chain.test.ts"
        expected: "exit code 0"

