task:
  title: "Split CLI command kernel into library handlers"
  summary: >
    oss/packages/cli/src/index.ts is still the biggest OSS entrypoint and mixes
    parsing, dispatch, command execution, and rendering. Move the remaining
    heavy command paths into library modules so the root index stays focused on
    argv parsing and top-level dispatch while cloud or other entrypoints can
    reuse command logic without re-implementing it.
  size: "medium"
  risk_level: "medium"
  context:
    packages:
      - "packages/cli"
      - "packages/contracts"
    files_impacted:
      - path: "packages/cli/src/index.ts"
        lines: "dispatch, doctor/dev/list/history/inspect rendering, command execution"
        reason: "Reduce index.ts to parse, dispatch, and thin wiring"
      - path: "packages/cli/src/commands"
        lines: "all"
        reason: "New command modules for remaining heavy commands"
      - path: "packages/cli/src/command-*.ts"
        lines: "all"
        reason: "Shared command context and rendering helpers if needed"
      - path: "packages/cli/src/index.test.ts"
        lines: "doctor/dev/list command coverage"
        reason: "Keep behavior stable while moving handlers"
    invariants:
      - "CLI output contracts stay unchanged"
      - "Argument parsing remains centralized"
      - "Command handlers remain callable as library code"
  objectives:
    - "Extract heavy command handlers out of index.ts into command modules"
    - "Extract matching renderers so command behavior and presentation stay colocated"
    - "Leave index.ts as argv parsing, command selection, and thin dispatch"
  touchpoints:
    - area: "packages/cli/src/index.ts"
      description: "Current monolithic parse, dispatch, and render entrypoint"
    - area: "packages/cli/src/commands"
      description: "Target library boundary for reusable command handlers"
    - area: "cloud/packages/api"
      description: "Longer-term consumer of extracted command logic"
  acceptance:
    definition_of_done:
      - id: "dod1"
        description: "doctor and dev command execution live outside packages/cli/src/index.ts"
        status: "done"
        checked_at: "2026-04-23T12:18:34Z"
      - id: "dod2"
        description: "Major CLI renderers for extracted commands live outside packages/cli/src/index.ts"
        status: "done"
        checked_at: "2026-04-23T12:18:34Z"
      - id: "dod3"
        description: "packages/cli/src/index.ts stays below 4000 lines"
        status: "done"
        checked_at: "2026-04-23T12:18:34Z"
    validation:
      - id: "v1"
        type: "compile"
        description: "OSS workspace typechecks after command extraction"
        command: "pnpm typecheck"
        expected: "exit code 0"
      - id: "v2"
        type: "test"
        description: "CLI command coverage remains green"
        command: "pnpm exec vitest run packages/cli/src/index.test.ts"
        expected: "exit code 0"
      - id: "v3"
        type: "boundary"
        description: "CLI root file budget drops under the target threshold"
        command: "test $(wc -l < packages/cli/src/index.ts) -lt 4000"
        expected: "exit code 0"

