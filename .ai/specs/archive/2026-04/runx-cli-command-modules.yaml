      - file: "packages/cli/src/commands/history.ts"
        action: "create"
        lines: "all"
        content_spec: |
          Own history and receipt inspection rendering helpers.
    acceptance_criteria:
      - id: "ac2_1"
        type: "boundary"
        description: "CLI root file shrinks under 4000 lines"
        command: "test $(wc -l < packages/cli/src/index.ts) -lt 4000"
        expected: "exit code 0"
    status: "completed"

