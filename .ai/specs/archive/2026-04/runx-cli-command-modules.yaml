      - file: "packages/cli/src/commands/doctor.ts"
        action: "create"
        lines: "all"
        content_spec: |
          Own doctor command execution, diagnostics, and doctor-specific
          rendering helpers.
      - file: "packages/cli/src/commands/dev.ts"
        action: "create"
